name: Release

# Fires only on minor/major version tags: v1.4.0, v2.0.0 — NOT patch tags (v1.4.1)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.0"

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — webkit2gtk-4.1 (Tauri v2 requirement)
          - platform: ubuntu-22.04
            args: ""

          # macOS — universal binary (Apple Silicon + Intel in one file)
          - platform: macos-latest
            args: "--target universal-apple-darwin"

          # Windows — NSIS installer + MSI
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── JavaScript toolchain ──────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal build needs both targets available
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Linux system dependencies (Tauri v2) ──────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # ── Build + publish release ───────────────────────────────────────────
      - name: Build and create GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DUCKDB_DOWNLOAD_LIB: "1"   # download prebuilt static DuckDB lib (avoids C++ compile)
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TableViewer ${{ github.ref_name }}"
          releaseBody: |
            ## What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Downloads
            | Platform | File |
            |---|---|
            | Linux | `.AppImage` or `.deb` |
            | macOS | `.dmg` (universal — Apple Silicon + Intel) |
            | Windows | `.msi` or `.exe` (NSIS) |
          releaseDraft: true
          prerelease: false
          tauriScript: bunx tauri
          args: ${{ matrix.args }}
